services:
  - type: web
    name: espaco-serena-backend
    env: docker
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PASSWORD_SALT
        generateValue: true
